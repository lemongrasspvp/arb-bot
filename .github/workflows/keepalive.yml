name: Keep Alive

# Prevents GitHub from disabling scheduled workflows after 60 days of inactivity
on:
  schedule:
    - cron: "0 12 * * 3"   # every Wednesday at noon

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep workflow alive
        run: echo "Keepalive ping — prevents GitHub from disabling scheduled workflows"
